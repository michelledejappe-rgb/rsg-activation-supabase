name: Synchronisation QG News

on:
  schedule:
    - cron: '0 * * * *' # S'exécute automatiquement toutes les heures
  workflow_dispatch: # Permet de déclencher la synchronisation d'un simple clic sur GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: npm install

      - name: Exécuter la synchronisation vers Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update_news.js
