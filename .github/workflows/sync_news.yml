name: Synchronisation QG News

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6,10,16,18 * * *' # S'exécute à 8h, 12h, 18h et 20h (heure de Bruxelles - CEST / UTC+2)
  workflow_dispatch: # Permet de déclencher la synchronisation d'un simple clic sur GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances
        run: npm install

      - name: Exécuter la synchronisation vers Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
        run: node scripts/update_news.js
